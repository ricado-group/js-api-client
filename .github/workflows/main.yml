# Action Name
name: Main Automated Builds

# Controls when the action will run
on:
  push:
    branches:
      - master
    tags:
      - "*.*.*"
  pull_request:

permissions:
  id-token: write
  contents: write

# Workflow Jobs
jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1 - Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v6
      
      # Step 2 - Setup NodeJS
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      # Step 3 - Install NPM Packages
      - name: Install NPM Packages
        run: npm ci

      # Step 4 - Build the Module
      - name: Build Module
        run: npm run build
      
      # Step 5 - Extract Package Version
      - name: Extract Package Version
        if: ${{ github.ref_type == 'tag' }}
        id: packageVersion
        uses: Saionaro/extract-package-version@v1.3.0
      
      # Step 6 - Check Package Version
      - name: Check Package Version
        if: ${{ github.ref_type == 'tag' && steps.packageVersion.outputs.version != github.ref_name }}
        run: exit 1
      
      # Step 7 - Publish to NPM
      - name: Publish to NPM
        if: ${{ github.ref_type == 'tag' }}
        run: npm publish
      
      # Step 8 - Generate the Changelog
      - name: Generate the Changelog
        id: changelog
        if: ${{ github.ref_type == 'tag' }}
        uses: metcalfc/changelog-generator@v4
        with:
          mytoken: ${{ secrets.GITHUB_TOKEN }}

      # Step 9 - Create GitHub Release
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: ncipollo/release-action@v1
        with:
          name: Version ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            ./dist/ricado.api.client.js
            ./lib/index.d.ts
            ./LICENSE
